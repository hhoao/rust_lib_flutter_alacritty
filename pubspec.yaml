name: rust_lib_flutter_alacritty
description: >-
  FFI plugin that builds the Alacritty-based terminal engine (Rust/cdylib)
  for the flutter_alacritty package.
version: 0.1.0
repository: https://github.com/hhoao/rust_lib_flutter_alacritty
issue_tracker: https://github.com/hhoao/rust_lib_flutter_alacritty/issues
homepage: https://github.com/hhoao/rust_lib_flutter_alacritty

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.0.2
  ffigen: ^11.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
